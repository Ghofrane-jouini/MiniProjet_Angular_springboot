<div class="container mt-5">
  <div class="row justify-content-md-center">
    <div class="col-md-4">
      @if (err) {
        <div class="alert alert-danger">
          <strong>{{ err }}</strong>
        </div>
      }
      <h4>Confirmation de votre email</h4>
      <p class="text-muted">Un code a été envoyé à <strong>{{ user.email }}</strong></p>
      <form>
        <div class="form-group mb-3">
          <label>Code de confirmation :</label>
          <input type="text" name="code" [(ngModel)]="code"
                 class="form-control" placeholder="Entrez le code reçu par mail">
        </div>
        <button type="button" class="btn btn-success w-100"
                (click)="onValidateEmail()">
          Valider mon email
        </button>
      </form>
    </div>
  </div>
</div>
